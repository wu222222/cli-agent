# Safe-CLI-Agent 插件配置 v2
#
# 字段说明:
#   type:               插件类型（exec / command / compose / local / network）
#   agent_type:         绑定到哪个 Agent（worker / judge / curator / none）
#                       none = 不绑定 Agent，直接执行（command 插件常用）
#   bound_action:       绑定的 ActionType（execute_command / local_call / stop）
#   requires_confirmation: 是否需要用户确认
#   command_trigger:    命令触发词（仅 type: command 使用），如 "/summary"
#   display_name:       前端/SSE 显示名（可选，如 call_judge 显示为 "JudgeAgent"）
#   category:           前端 ToolsView 分类（shell / search / ai / command / lab / other）
#   icon:               前端图标标识
#   mount_dirs:         挂载目录，格式 "/host/path:/container/path"
#
# 注意: 所有插件统一由此文件管理，不再有代码硬编码注册。

plugins:

  # ============================
  # exec 插件 — Agent 工具
  # ============================

  - name: "alpine_shell"
    type: "exec"
    agent_type: "worker"
    bound_action: "execute_command"
    requires_confirmation: true
    description: "Alpine Linux 轻量级 shell 环境，适合基础命令操作"
    container_name: "alpine_shell"
    image: "alpine:latest"
    entrypoint_cmd: "sh -c"
    mount_dirs: ["./workspace:/workspace"]
    category: "shell"
    icon: "terminal"
    parameters:
      command:
        type: "string"
        description: "要执行的 shell 命令"
    required_params: ["command"]

  - name: "grep_knowledge"
    type: "exec"
    agent_type: "worker"
    bound_action: "execute_command"
    requires_confirmation: false
    description: "在知识库容器中搜索 CLI 最佳实践、故障排除步骤和命令语法"
    container_name: "kb_container"
    image: "alpine:latest"
    entrypoint_cmd: "sh -c"
    mount_dirs: ["./knowledge_base:/knowledge_base:rw"]
    category: "search"
    icon: "search"
    parameters:
      command:
        type: "string"
        description: "在知识库目录中执行的 Shell 命令，如 'grep -r keyword /knowledge_base'"
    required_params: ["command"]

  - name: "search"
    type: "exec"
    agent_type: "worker"
    bound_action: "execute_command"
    requires_confirmation: false
    description: "互联网搜索工具 — 通过 DuckDuckGo 搜索网页信息，无需 API Key"
    container_name: "search"
    image: "search-tool:latest"
    network_mode: "bridge"
    entrypoint_cmd: "python3 /app/search.py"
    mount_dirs: []
    category: "search"
    icon: "globe"
    parameters:
      command:
        type: "string"
        description: "搜索关键词（英文效果更好），如 'python tutorial'"
    required_params: ["command"]

  - name: "cpp_python_dev"
    type: "exec"
    agent_type: "worker"
    bound_action: "execute_command"
    requires_confirmation: true
    description: "C++/Python 开发环境 — 支持编译 C++ 代码和运行 Python 脚本，可用于开发和测试小型项目"
    container_name: "cpp_python_dev"
    image: "cpp-python-dev:latest"
    entrypoint_cmd: "bash -c"
    mount_dirs:
      - "./workspace:/workspace:rw"  # 挂载本地工作目录
    category: "shell"
    icon: "code"
    parameters:
      command:
        type: "string"
        description: "要执行的命令，如 'g++ main.cpp -o app && ./app' 或 'python3 script.py'"
    required_params: ["command"]

  # ============================
  # command 插件 — 用户快捷命令
  # ============================

  - name: "curator"
    type: "command"
    agent_type: "curator"
    command_trigger: "/summary"
    bound_action: "execute_command"
    requires_confirmation: true
    description: "知识库管理 — 输入 /summary 触发 CuratorAgent 整理经验教训"
    container_name: "kb_container"
    image: "alpine:latest"
    entrypoint_cmd: "sh -c"
    mount_dirs: ["./knowledge_base:/knowledge_base:rw"]
    category: "command"
    icon: "book"
    parameters:
      command:
        type: "string"
        description: "在知识库中执行的 Shell 命令"
    required_params: ["command"]

  - name: "context_compress"
    type: "local"
    agent_type: "worker"
    bound_action: "local_call"
    requires_confirmation: false
    description: "上下文压缩工具 — 将旧的历史消息压缩为简洁摘要，减少 token 消耗。当上下文过长时主动调用。"
    display_name: "ContextCompress"
    category: "ai"
    icon: "compress"
    parameters:
      messages_to_compress:
        type: "string"
        description: "需要压缩的历史消息文本"
    required_params: ["messages_to_compress"]

  # ============================
  # local 插件 — 进程内函数
  # ============================

  - name: "call_judge"
    type: "local"
    agent_type: "judge"
    bound_action: "local_call"
    requires_confirmation: false
    description: "调用 JudgeAgent 评审结果合理性"
    display_name: "JudgeAgent"
    param_schema: "src.agent.types:LocalCallParams"
    category: "ai"
    icon: "check"
    parameters:
      final_answer:
        type: "string"
        description: "最终准备给用户的判断结果"
      evidence_summary:
        type: "string"
        description: "简述你得出此结论的证据链（可选）"
    required_params: ["final_answer"]

# 实验插件（ctf_lab, crypto_tls, kali）已移至 config/plugins_lab.yaml
# 详见 LABS.md
