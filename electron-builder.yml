appId: "com.safecliagent.app"
productName: "Safe-CLI-Agent"
copyright: "Copyright © 2026"

directories:
  output: "release"
  buildResources: "build"

files:
  - "out/**/*"              # electron-vite 编译产物（main + preload）
  - "frontend/dist/**/*"    # Vue 3 前端打包产物
  - "src/**/*"              # Python 源码
  - "config/**/*"           # 插件配置
  - "knowledge_base/**/*"   # 知识库
  - "workspace/**/*"        # 工作目录
  - "electron/resources/**/*"  # Electron 资源文件（配置界面等）

# asar 排除：Python 源码必须在磁盘上（Python 无法从 asar 内执行）
asarUnpack:
  - "src/**/*"
  - "config/**/*"
  - "electron/resources/**/*"

# Python 后端 — 使用系统 Python（用户需预装 Python 3.10+ 和 Docker）
# 后续可改为 extraResources + PyInstaller 打包独立 Python

# ── Windows ──
win:
  target:
    - target: "nsis"
      arch: ["x64"]
  icon: "build/icon.ico"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Safe-CLI-Agent"

# ── macOS ──
mac:
  target:
    - target: "dmg"
      arch: ["x64", "arm64"]
  icon: "build/icon.icns"
  category: "public.app-category.developer-tools"
  entitlements: "build/entitlements.mac.plist"
  hardenedRuntime: true

# ── Linux ──
linux:
  target:
    - target: "AppImage"
      arch: ["x64"]
    - target: "deb"
      arch: ["x64"]
  icon: "build/icon.png"
  category: "Development"

# 自动更新（GitHub Releases）
publish:
  provider: "github"
  owner: "wu222222"
  repo: "cli-agent"
