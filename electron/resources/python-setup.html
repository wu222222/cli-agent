<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe-CLI-Agent - Python 环境配置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* 全局滚动条样式 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    ::-webkit-scrollbar-corner { background: transparent; }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px;
      max-width: 650px;
      width: 90%;
      -webkit-app-region: no-drag;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .header p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .error-box h3 {
      color: #ef4444;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .error-box pre {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 6px;
      font-size: 11px;
      font-family: 'Consolas', 'Monaco', monospace;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: rgba(255, 255, 255, 0.7);
      max-height: 120px;
      overflow-y: auto;
    }

    .section {
      margin-bottom: 24px;
    }

    .section h2 {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .path-list {
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.15);
    }

    .path-item {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
      transition: all 0.15s;
    }

    .path-item:last-child { border-bottom: none; }
    .path-item:hover { background: rgba(255, 255, 255, 0.05); }
    .path-item.selected { background: rgba(99, 102, 241, 0.15); border-color: rgba(99, 102, 241, 0.3); }

    .path-item .path {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.9);
      word-break: break-all;
    }

    .path-item .meta {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge.recommended {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .badge.has-fastapi {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    .badge.no-fastapi {
      background: rgba(234, 179, 8, 0.15);
      color: #eab308;
    }

    .manual-input {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .manual-input input {
      flex: 1;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Consolas', 'Monaco', monospace;
      color: #fff;
      outline: none;
      transition: all 0.15s;
    }

    .manual-input input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .manual-input input:focus {
      border-color: rgba(99, 102, 241, 0.5);
      background: rgba(0, 0, 0, 0.3);
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      outline: none;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #6366f1;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #4f46e5;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.12);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 10px;
    }

    .loading {
      text-align: center;
      padding: 24px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success-msg {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 10px;
      padding: 16px;
      margin-top: 16px;
      color: #22c55e;
      font-size: 13px;
      display: none;
    }

    .empty-msg {
      padding: 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Safe-CLI-Agent</h1>
      <p>Python 环境配置</p>
    </div>

    <div class="error-box" id="errorBox">
      <h3>后端启动失败</h3>
      <pre id="errorMessage">正在加载错误信息...</pre>
    </div>

    <div class="section">
      <h2>选择 Python 路径</h2>
      <div class="path-list" id="pathList">
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>正在检测可用的 Python 环境...</div>
        </div>
      </div>
      <div class="manual-input">
        <input type="text" id="manualPath" placeholder="或手动输入 Python 路径...">
        <button class="btn btn-secondary" onclick="browsePath()">浏览</button>
      </div>
      <p class="hint">推荐使用已安装 fastapi 的 Python 环境（safe-cli-agent）</p>
    </div>

    <div class="success-msg" id="successMsg">
      ✓ 配置已保存，正在重启后端服务...
    </div>

    <div class="actions">
      <button class="btn btn-secondary" onclick="exitApp()">退出</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveConfig()" disabled>保存并重启</button>
    </div>
  </div>

  <script>
    // 使用 preload 暴露的 API
    let selectedPath = '';
    let electronAPI = null;

    // 初始化
    async function init() {
      console.log('初始化配置界面...');

      // 获取 electronAPI
      electronAPI = window.electronAPI;
      console.log('electronAPI:', electronAPI ? '可用' : '不可用');

      // 如果 electronAPI 不可用，显示错误
      if (!electronAPI) {
        document.getElementById('errorMessage').textContent = '无法加载 Electron API，请重启应用';
        document.getElementById('pathList').innerHTML = '<div class="empty-msg">API 加载失败</div>';
        return;
      }

      // 监听错误信息
      if (electronAPI.onSetErrorMessage) {
        console.log('注册错误信息监听...');
        electronAPI.onSetErrorMessage((message) => {
          console.log('收到错误信息:', message);
          document.getElementById('errorMessage').textContent = message || '无法启动 Python 服务';
        });
      }

      // 监听文件选择结果
      if (electronAPI.onPythonPathSelected) {
        electronAPI.onPythonPathSelected((path) => {
          console.log('选择的路径:', path);
          if (path) {
            selectPath(path, null);
          }
        });
      }

      // 加载可用的 Python 路径
      await loadPythonPaths();
    }

    // 加载可用的 Python 路径
    async function loadPythonPaths() {
      const pathList = document.getElementById('pathList');

      try {
        // 通过 IPC 让主进程检测
        if (electronAPI && electronAPI.detectPythonPaths) {
          console.log('开始检测 Python 路径...');

          // 设置超时
          const timeoutPromise = new Promise((_, reject) => {
            setTimeout(() => reject(new Error('检测超时')), 15000);
          });

          const pathsPromise = electronAPI.detectPythonPaths();
          const paths = await Promise.race([pathsPromise, timeoutPromise]);

          console.log('检测结果:', JSON.stringify(paths));

          if (paths && Array.isArray(paths) && paths.length > 0) {
            renderPaths(paths);
          } else {
            pathList.innerHTML = '<div class="empty-msg">未检测到 Python 环境，请手动输入路径</div>';
          }
        } else {
          throw new Error('detectPythonPaths API 不可用');
        }
      } catch (err) {
        console.error('检测 Python 路径失败:', err.message || err);
        pathList.innerHTML = `
          <div class="empty-msg">
            自动检测失败: ${err.message || '未知错误'}<br>
            <small style="color: rgba(255,255,255,0.3); margin-top: 8px; display: block;">
              请手动输入 Python 路径
            </small>
          </div>
        `;
      }
    }

    // 渲染路径列表
    function renderPaths(paths) {
      const list = document.getElementById('pathList');
      if (!paths || paths.length === 0) {
        list.innerHTML = '<div class="empty-msg">未检测到可用的 Python 环境</div>';
        return;
      }

      // 排序：推荐的在前面，有 fastapi 的在前面
      paths.sort((a, b) => {
        if (a.recommended !== b.recommended) return b.recommended ? 1 : -1;
        if (a.has_fastapi !== b.has_fastapi) return b.has_fastapi ? 1 : -1;
        return 0;
      });

      list.innerHTML = paths.map(p => `
        <div class="path-item ${p.recommended ? 'selected' : ''}"
             onclick="selectPath('${escapeHtml(p.path)}', this)">
          <div class="path">${escapeHtml(p.path)}</div>
          <div class="meta">
            <span>${escapeHtml(p.source)}</span>
            ${p.recommended ? '<span class="badge recommended">推荐</span>' : ''}
            <span class="badge ${p.has_fastapi ? 'has-fastapi' : 'no-fastapi'}">
              ${p.has_fastapi ? '✓ 已安装 fastapi' : '✕ 缺少 fastapi'}
            </span>
          </div>
        </div>
      `).join('');

      // 默认选中推荐项
      const recommended = paths.find(p => p.recommended && p.has_fastapi) || paths.find(p => p.recommended) || paths[0];
      if (recommended) {
        selectPath(recommended.path, list.querySelector('.path-item.selected') || list.querySelector('.path-item'));
      }
    }

    // HTML 转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 选择路径
    function selectPath(path, element) {
      selectedPath = path;
      document.getElementById('manualPath').value = path;
      document.getElementById('saveBtn').disabled = false;

      // 更新选中状态
      document.querySelectorAll('.path-item').forEach(el => el.classList.remove('selected'));
      if (element) element.classList.add('selected');
    }

    // 浏览文件
    function browsePath() {
      if (electronAPI && electronAPI.browsePythonPath) {
        electronAPI.browsePythonPath();
      }
    }

    // 保存配置
    async function saveConfig() {
      const path = document.getElementById('manualPath').value.trim() || selectedPath;
      if (!path) {
        alert('请选择或输入 Python 路径');
        return;
      }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = '保存中...';

      try {
        // 保存路径
        if (electronAPI && electronAPI.savePythonPath) {
          electronAPI.savePythonPath(path);
        }

        // 显示成功消息
        document.getElementById('successMsg').style.display = 'block';
        document.getElementById('errorBox').style.display = 'none';

        // 1.5 秒后重启
        setTimeout(() => {
          if (electronAPI && electronAPI.restartPython) {
            electronAPI.restartPython();
          }
        }, 1500);
      } catch (err) {
        alert('保存失败: ' + err.message);
        btn.disabled = false;
        btn.textContent = '保存并重启';
      }
    }

    // 退出应用
    function exitApp() {
      console.log('点击退出按钮');
      if (electronAPI && electronAPI.quitApp) {
        electronAPI.quitApp();
      } else {
        // 备用方案：直接关闭窗口
        window.close();
      }
    }

    // 初始化
    init();
  </script>
</body>
</html>
