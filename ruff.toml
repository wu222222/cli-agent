# Ruff configuration for Safe-CLI-Agent
# https://docs.astral.sh/ruff/

# Target Python 3.10+
target-version = "py310"

# Line length
line-length = 120

[lint]
# Enable rules
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
]

# Ignore rules
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
    "SIM108", # use ternary operator (reduces readability)
    "F403",   # wildcard imports (used in agent module)
    "F405",   # may be undefined from wildcard imports
    "E402",   # module level import not at top (needed for some patterns)
    "RUF001", # ambiguous unicode character in string (Chinese punctuation)
    "RUF002", # ambiguous unicode character in docstring
    "RUF003", # ambiguous unicode character in comment
    "RUF013", # implicit Optional (Python 3.10+ supports X | None)
]

# Per-file rules
[lint.per-file-ignores]
# Allow wildcard imports in __init__.py
"__init__.py" = ["F401", "F403"]
# Allow print in examples and tests
"examples/*.py" = ["T201"]
"tests/*.py" = ["T201"]

# Import sorting (isort-compatible)
[lint.isort]
known-first-party = ["src"]
known-third-party = ["fastapi", "pydantic", "docker", "openai"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

# Naming conventions
[lint.pep8-naming]
# Allow FastAPI-style function names (camelCase for route handlers)
ignore-names = ["setUp", "tearDown", "setUpClass", "tearDownClass"]

# Formatting
[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
